version: 0.2

env:
  variables:
    VITE_API_BASE_URL: "https://taskflow.staging.informup.org"
    CLOUDFRONT_DISTRIBUTION_ID: "E3UYQCEDDEAPW7"
    S3_BUCKET: "taskflow.staging.informup.org"
  parameter-store:
    VITE_GOOGLE_CLIENT_ID: /taskflow/staging/VITE_GOOGLE_CLIENT_ID

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - cd frontend
      - npm ci
  build:
    commands:
      - npx vite build
  post_build:
    commands:
      - aws s3 sync dist/ "s3://${S3_BUCKET}/" --delete
      - aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"

artifacts:
  files:
    - "**/*"
  base-directory: frontend/dist
